<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Whiteboard Tornet</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --color-60-bg: #F3F4F6;
    --color-60-surface: #FFFFFF;
    --color-30-dark: #1F2937;
    --color-30-muted: #6B7280;
    --color-10-accent: #4F46E5;
    --color-10-hover: #4338CA;
    --panel-width: 320px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--color-60-bg);
    color: var(--color-30-dark);
    touch-action: none;
}

/* --- Viewport & Canvas --- */
#viewport {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    right: var(--panel-width);
    overflow: hidden;
    cursor: grab;
    transition: right 0.2s ease;
}
#viewport.expanded { right: 0; }
#viewport:active { cursor: grabbing; }
#board { position: absolute; transform-origin: 0 0; will-change: transform; }

/* --- Noder & Lagerstyrning --- */
.node {
    position: absolute;
    background: var(--color-60-surface);
    border-radius: 12px;
    padding: 20px;
    user-select: none;
    border: 2px solid #E5E7EB;
    transition: border-color 0.1s, transform 0.1s;
}

/* Tornet */
.tower {
    width: 620px;
    background: var(--color-30-dark);
    color: var(--color-60-surface);
    border: 2px solid var(--color-30-dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 25px;
    height: 120px;
    z-index: 1;
}

.tower-title { font-weight: 700; font-size: 1.4rem; white-space: nowrap; }

.tower-logo {
    position: absolute;
    top: -300px;
    left: 48%;
    transform: translateX(-50%);
    width: 300px;
    height: 300px;
    background-image: url('Tower.png');
    background-size: cover;
    background-repeat: no-repeat;
    z-index: 10;
}

/* Knappar */
.ui-btn {
    position: relative;
    z-index: 11;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--color-60-surface);
    color: var(--color-30-dark);
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.1s, color 0.1s;
    white-space: nowrap;
}
.ui-btn:hover, .ui-btn:active { border-color: var(--color-10-accent); color: var(--color-10-accent); }
.pill-btn { border-radius: 30px; }
.rect-btn { border-radius: 8px; }
.icon-circle { width: 12px; height: 12px; border-radius: 50%; background: var(--color-10-accent); flex-shrink: 0; }
.icon-square { width: 12px; height: 12px; border-radius: 3px; background: var(--color-10-accent); flex-shrink: 0; }

/* Gruppledare & Plattformar */
.person, .platform { z-index: 10; }

.person {
    width: 100px; height: 120px; text-align: center;
    font-size: 13px; font-weight: 500; padding: 15px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.figure {
    width: 40px; height: 40px; background: var(--color-60-bg); border-radius: 50%;
    margin-bottom: 12px; position: relative;
}
.figure::before { content: ''; width: 14px; height: 14px; background: var(--color-30-dark); border-radius: 50%; position: absolute; top: 8px; left: 13px; }
.figure::after { content: ''; width: 24px; height: 12px; background: var(--color-30-dark); border-radius: 12px 12px 0 0; position: absolute; top: 24px; left: 8px; }

.platform { width: 260px; text-align: center; font-weight: 600; }
.placeholder {
    margin-top: 15px; background-color: var(--color-60-bg);
    background-image: url('plattform.png'); background-size: cover;
    background-position: center; background-repeat: no-repeat;
    height: 100px; border-radius: 6px; border: 2px dashed #D1D5DB;
}

/* --- Animation Brev --- */
.envelope {
    position: absolute;
    width: 30px; height: 30px;
    background-image: url('brev.png');
    background-size: contain;
    background-repeat: no-repeat;
    pointer-events: none;
    opacity: 0;
    z-index: 5;
    offset-rotate: auto;
}
.envelope.active { opacity: 1; animation: moveAlong 1.5s linear infinite; }
@keyframes moveAlong { from { offset-distance: 0%; } to { offset-distance: 100%; } }

/* --- SVG Linjer --- */
#connections {
    position: absolute; top: 0; left: 0;
    pointer-events: none;
    z-index: 5;
}
.anim-line {
    stroke: var(--color-10-accent); stroke-width: 2.5; stroke-linecap: round;
    fill: none; opacity: 0; transition: opacity 0.15s;
}
.anim-line.active { opacity: 1; stroke-dasharray: 8 8; animation: flow 0.6s linear infinite; }
@keyframes flow { to { stroke-dashoffset: -16; } }

/* --- Admin Panel --- */
#adminPanel {
    position: absolute; right: 0; top: 0;
    width: var(--panel-width); height: 100%;
    background: var(--color-30-dark); color: var(--color-60-surface);
    transition: transform 0.2s ease-out;
    overflow-y: auto; z-index: 100;
}
#adminPanel.collapsed { transform: translateX(100%); }

#togglePanel {
    position: absolute; right: var(--panel-width); top: 20px;
    background: var(--color-10-accent); color: var(--color-60-surface);
    padding: 10px 20px; border-radius: 20px 0 0 20px;
    cursor: pointer; font-weight: 600; font-size: 14px;
    transition: right 0.2s ease-out; z-index: 101;
    user-select: none;
}
#adminPanel.collapsed ~ #togglePanel { right: 0 !important; }

.panel-header { padding: 20px; font-size: 18px; font-weight: 700; border-bottom: 1px solid #374151; }
.tool { padding: 15px 20px; border-bottom: 1px solid #374151; cursor: pointer; }
.tool:hover, .tool:active { background: #374151; color: var(--color-10-accent); }

/* --- Modal --- */
.modal {
    position: fixed; inset: 0;
    background: rgba(17, 24, 39, 0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
}
.modalContent {
    background: var(--color-60-surface);
    padding: 25px; width: 100%; max-width: 400px;
    border-radius: 12px;
}
.modalContent input, .modalContent textarea {
    width: 100%; margin-bottom: 15px; padding: 10px;
    border: 1px solid #D1D5DB; border-radius: 6px;
    box-sizing: border-box; font-family: inherit; font-size: 14px;
}
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap; }
.btn {
    padding: 8px 16px; border-radius: 6px; border: none;
    font-weight: 600; cursor: pointer; font-size: 14px;
}
.btn-secondary { background: #E5E7EB; color: var(--color-30-dark); }
.btn-primary { background: var(--color-10-accent); color: var(--color-60-surface); }

/* --- Mobile Zoom Controls --- */
#zoomControls {
    display: none;
    position: fixed;
    bottom: 20px; left: 20px;
    flex-direction: column; gap: 8px;
    z-index: 99;
}
#zoomControls button {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--color-60-surface);
    color: var(--color-30-dark);
    font-size: 20px; font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}
#zoomControls button:active { background: var(--color-60-bg); }

/* --- Fit-to-view button --- */
#fitBtn {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 80px;
    z-index: 99;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--color-10-accent);
    color: white;
    font-size: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    cursor: pointer;
    align-items: center; justify-content: center;
}

/* ========== RESPONSIVE ========== */

/* Tablets */
@media (max-width: 1024px) {
    :root { --panel-width: 280px; }

    .tower {
        width: 520px;
        padding: 12px 18px;
        height: 110px;
    }
    .tower-title { font-size: 1.2rem; }
    .ui-btn { font-size: 12px; padding: 6px 12px; gap: 8px; }
    .platform { width: 220px; }
}

/* Mobile */
@media (max-width: 768px) {
    :root { --panel-width: 0px; }

    #viewport { right: 0; }

    /* Admin panel as bottom sheet */
    #adminPanel {
        width: 100%;
        height: 60vh;
        top: auto; bottom: 0; right: 0;
        border-radius: 20px 20px 0 0;
        transform: translateY(100%);
        transition: transform 0.3s ease-out;
    }
    #adminPanel.open { transform: translateY(0); }
    #adminPanel.collapsed { transform: translateY(100%); }

    #togglePanel {
        right: auto; left: 50%; top: auto; bottom: 20px;
        transform: translateX(-50%);
        border-radius: 30px;
        padding: 12px 24px;
        font-size: 13px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        transition: opacity 0.2s, bottom 0.2s;
    }
    #adminPanel.collapsed ~ #togglePanel {
        right: auto !important;
        bottom: 20px;
    }
    #adminPanel:not(.collapsed) ~ #togglePanel {
        bottom: calc(60vh + 10px);
    }

    .panel-header {
        text-align: center;
        position: relative;
    }
    .panel-header::before {
        content: '';
        display: block;
        width: 40px; height: 4px;
        background: #4B5563;
        border-radius: 2px;
        margin: 0 auto 12px;
    }

    /* Tower responsive */
    .tower {
        width: 340px;
        height: auto;
        min-height: 80px;
        flex-direction: column;
        gap: 10px;
        padding: 15px;
    }
    .tower-title { font-size: 1.1rem; order: -1; }
    .ui-btn { font-size: 11px; padding: 6px 12px; width: 100%; justify-content: center; }

    .tower-logo {
        width: 200px; height: 200px;
        top: -200px;
    }

    /* Nodes smaller on mobile */
    .person { width: 80px; height: 100px; padding: 10px; font-size: 11px; }
    .figure { width: 32px; height: 32px; margin-bottom: 8px; }
    .figure::before { width: 12px; height: 12px; top: 6px; left: 10px; }
    .figure::after { width: 20px; height: 10px; top: 20px; left: 6px; }

    .platform { width: 180px; font-size: 12px; padding: 12px; }
    .placeholder { height: 70px; margin-top: 10px; }

    /* Zoom controls visible */
    #zoomControls { display: flex; }
    #fitBtn { display: flex; }

    /* Modal full width */
    .modalContent { padding: 20px; }
    .modalContent h3 { font-size: 16px; margin-top: 0; }
}

/* Small phones */
@media (max-width: 400px) {
    .tower {
        width: 280px;
    }
    .ui-btn { font-size: 10px; padding: 5px 10px; gap: 6px; }
    .tower-title { font-size: 1rem; }
    .platform { width: 150px; font-size: 11px; padding: 10px; }
    .placeholder { height: 55px; }
    .person { width: 70px; height: 90px; font-size: 10px; }
}
</style>
</head>
<body>

<div id="viewport">
    <div id="board">
        <div id="tower" class="node tower" style="top:40px; left:220px;">
            <div class="tower-logo"></div>
            <div id="btn-circle" class="ui-btn pill-btn">
                <div class="icon-circle"></div> Mejla alla gruppledare
            </div>
            <div class="tower-title">Tornet</div>
            <div id="btn-square" class="ui-btn rect-btn">
                <div class="icon-square"></div> Utskick via alla plattformar
            </div>
        </div>

        <svg id="connections" width="4000" height="4000"></svg>

        <div id="g1" class="node person" style="top:200px; left:150px;"><div class="figure"></div><div class="label">Gruppledare</div></div>
        <div id="g2" class="node person" style="top:200px; left:470px;"><div class="figure"></div><div class="label">Gruppledare</div></div>
        <div id="g3" class="node person" style="top:200px; left:800px;"><div class="figure"></div><div class="label">Gruppledare</div></div>

        <div id="p1" class="node platform" style="top:380px; left:100px;">Marknadsgruppen<div class="placeholder"></div></div>
        <div id="p2" class="node platform" style="top:380px; left:420px;">Expertgrupp Sociala Medier<div class="placeholder"></div></div>
        <div id="p3" class="node platform" style="top:380px; left:740px;">Valarbetargruppen<div class="placeholder"></div></div>
    </div>
</div>

<!-- Zoom Controls (mobile) -->
<div id="zoomControls">
    <button id="zoomIn" aria-label="Zooma in">+</button>
    <button id="zoomOut" aria-label="Zooma ut">−</button>
</div>
<button id="fitBtn" aria-label="Anpassa vy">⊡</button>

<div id="adminPanel" class="collapsed">
    <div class="panel-header">Adminverktyg</div>
    <div class="tool">Översikt</div>
    <div class="tool">Schemaläggning</div>
    <div class="tool">Rapporter</div>
    <div class="tool">Statistik</div>
    <div class="tool">Skapa ny grupp</div>
    <div class="tool">Behörigheter</div>
</div>
<div id="togglePanel">Verktyg</div>

<div class="modal" id="modal">
    <div class="modalContent">
        <h3 id="modalTitle">Massutskick</h3>
        <input type="text" placeholder="Ämne">
        <textarea rows="5" placeholder="Skriv ditt meddelande här..."></textarea>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal()">Avbryt</button>
            <button class="btn btn-primary" onclick="closeModal()">Skicka meddelande</button>
        </div>
    </div>
</div>

<script>
const viewport = document.getElementById("viewport");
const board = document.getElementById("board");
let scale = 1, x = 0, y = 0;
const isMobile = () => window.innerWidth <= 768;

function setTransform() {
    board.style.transform = `translate(${x}px,${y}px) scale(${scale})`;
}

// --- Desktop panning (mouse) ---
let isPanning = false, startX = 0, startY = 0;
viewport.addEventListener("mousedown", e => {
    if (e.button !== 0 || e.target.closest(".node")) return;
    isPanning = true;
    startX = e.clientX - x;
    startY = e.clientY - y;
});
window.addEventListener("mousemove", e => {
    if (!isPanning) return;
    x = e.clientX - startX;
    y = e.clientY - startY;
    setTransform();
});
window.addEventListener("mouseup", () => isPanning = false);

// --- Desktop zoom (wheel) ---
viewport.addEventListener("wheel", e => {
    e.preventDefault();
    const rect = viewport.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const zoom = e.deltaY < 0 ? 1.1 : 0.9;
    const newScale = Math.min(Math.max(scale * zoom, 0.2), 3);
    x = mx - (mx - x) * (newScale / scale);
    y = my - (my - y) * (newScale / scale);
    scale = newScale;
    setTransform();
}, { passive: false });

// --- Touch: panning & pinch zoom ---
let touches = {};
let lastPinchDist = 0;
let lastTouchX = 0, lastTouchY = 0;
let touchPanning = false;

viewport.addEventListener("touchstart", e => {
    if (e.target.closest(".ui-btn")) return; // allow button taps
    
    if (e.touches.length === 1 && !e.target.closest(".node")) {
        touchPanning = true;
        lastTouchX = e.touches[0].clientX - x;
        lastTouchY = e.touches[0].clientY - y;
    }
    if (e.touches.length === 2) {
        touchPanning = false;
        lastPinchDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
    }
}, { passive: true });

viewport.addEventListener("touchmove", e => {
    if (e.target.closest(".ui-btn")) return;
    e.preventDefault();
    
    if (e.touches.length === 1 && touchPanning) {
        x = e.touches[0].clientX - lastTouchX;
        y = e.touches[0].clientY - lastTouchY;
        setTransform();
    }
    if (e.touches.length === 2) {
        const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        const rect = viewport.getBoundingClientRect();
        const mx = midX - rect.left;
        const my = midY - rect.top;
        
        const zoomFactor = dist / lastPinchDist;
        const newScale = Math.min(Math.max(scale * zoomFactor, 0.2), 3);
        
        x = mx - (mx - x) * (newScale / scale);
        y = my - (my - y) * (newScale / scale);
        scale = newScale;
        lastPinchDist = dist;
        setTransform();
    }
}, { passive: false });

viewport.addEventListener("touchend", () => {
    touchPanning = false;
    lastPinchDist = 0;
});

// --- Zoom buttons (mobile) ---
document.getElementById("zoomIn").addEventListener("click", () => {
    const rect = viewport.getBoundingClientRect();
    const cx = rect.width / 2, cy = rect.height / 2;
    const newScale = Math.min(scale * 1.3, 3);
    x = cx - (cx - x) * (newScale / scale);
    y = cy - (cy - y) * (newScale / scale);
    scale = newScale;
    setTransform();
});
document.getElementById("zoomOut").addEventListener("click", () => {
    const rect = viewport.getBoundingClientRect();
    const cx = rect.width / 2, cy = rect.height / 2;
    const newScale = Math.max(scale * 0.7, 0.2);
    x = cx - (cx - x) * (newScale / scale);
    y = cy - (cy - y) * (newScale / scale);
    scale = newScale;
    setTransform();
});

// --- Fit to view ---
function fitToView() {
    const rect = viewport.getBoundingClientRect();
    const nodes = board.querySelectorAll('.node');
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    nodes.forEach(n => {
        minX = Math.min(minX, n.offsetLeft);
        minY = Math.min(minY, n.offsetTop);
        maxX = Math.max(maxX, n.offsetLeft + n.offsetWidth);
        maxY = Math.max(maxY, n.offsetTop + n.offsetHeight);
    });
    const contentW = maxX - minX;
    const contentH = maxY - minY;
    const padding = 40;
    const scaleX = (rect.width - padding * 2) / contentW;
    const scaleY = (rect.height - padding * 2) / contentH;
    scale = Math.min(scaleX, scaleY, 1.5);
    x = (rect.width - contentW * scale) / 2 - minX * scale;
    y = (rect.height - contentH * scale) / 2 - minY * scale;
    setTransform();
}
document.getElementById("fitBtn").addEventListener("click", fitToView);

// --- Connections ---
const svg = document.getElementById("connections");
const tower = document.getElementById("tower");
const btnCircle = document.getElementById("btn-circle");
const btnSquare = document.getElementById("btn-square");
const leaders = [document.getElementById("g1"), document.getElementById("g2"), document.getElementById("g3")];
const platforms = [document.getElementById("p1"), document.getElementById("p2"), document.getElementById("p3")];

let leaderLinesDOM = [], leaderEnvelopesDOM = [], platformLinesDOM = [], platformEnvelopesDOM = [];

function createConnection(x1, y1, x2, y2) {
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    const d = `M ${x1} ${y1} L ${x2} ${y2}`;
    path.setAttribute("d", d);
    path.setAttribute("class", "anim-line");
    svg.appendChild(path);
    const env = document.createElement("div");
    env.className = "envelope";
    env.style.offsetPath = `path('${d}')`;
    board.appendChild(env);
    return { path, env };
}

function connect() {
    svg.innerHTML = "";
    document.querySelectorAll('.envelope').forEach(e => e.remove());
    leaderLinesDOM = []; leaderEnvelopesDOM = []; platformLinesDOM = []; platformEnvelopesDOM = [];

    const circleStartX = tower.offsetLeft + btnCircle.offsetLeft + (btnCircle.offsetWidth / 2);
    const circleStartY = tower.offsetTop + btnCircle.offsetTop + (btnCircle.offsetHeight / 2);
    const squareStartX = tower.offsetLeft + btnSquare.offsetLeft + (btnSquare.offsetWidth / 2);
    const squareStartY = tower.offsetTop + btnSquare.offsetTop + (btnSquare.offsetHeight / 2);

    leaders.forEach(l => {
        const res = createConnection(circleStartX, circleStartY, l.offsetLeft + (l.offsetWidth / 2), l.offsetTop + (l.offsetHeight / 2));
        leaderLinesDOM.push(res.path);
        leaderEnvelopesDOM.push(res.env);
    });
    platforms.forEach(p => {
        const res = createConnection(squareStartX, squareStartY, p.offsetLeft + (p.offsetWidth / 2), p.offsetTop + (p.offsetHeight / 2));
        platformLinesDOM.push(res.path);
        platformEnvelopesDOM.push(res.env);
    });
}
connect();

// --- Hover & Tap activation for lines ---
function activateLeaders() {
    leaderLinesDOM.forEach(l => l.classList.add("active"));
    leaderEnvelopesDOM.forEach(e => e.classList.add("active"));
}
function deactivateLeaders() {
    leaderLinesDOM.forEach(l => l.classList.remove("active"));
    leaderEnvelopesDOM.forEach(e => e.classList.remove("active"));
}
function activatePlatforms() {
    platformLinesDOM.forEach(l => l.classList.add("active"));
    platformEnvelopesDOM.forEach(e => e.classList.add("active"));
}
function deactivatePlatforms() {
    platformLinesDOM.forEach(l => l.classList.remove("active"));
    platformEnvelopesDOM.forEach(e => e.classList.remove("active"));
}

// Desktop hover
btnCircle.onmouseenter = activateLeaders;
btnCircle.onmouseleave = deactivateLeaders;
btnSquare.onmouseenter = activatePlatforms;
btnSquare.onmouseleave = deactivatePlatforms;

// Click / Tap
btnCircle.onclick = e => {
    e.stopPropagation();
    if (isMobile()) {
        activateLeaders();
        setTimeout(deactivateLeaders, 1500);
    }
    openModal("Mejla alla gruppledare");
};
btnSquare.onclick = e => {
    e.stopPropagation();
    if (isMobile()) {
        activatePlatforms();
        setTimeout(deactivatePlatforms, 1500);
    }
    openModal("Utskick via alla plattformar");
};

// --- Modal ---
const modal = document.getElementById("modal");
function openModal(title) {
    document.getElementById("modalTitle").textContent = title;
    modal.style.display = "flex";
}
function closeModal() { modal.style.display = "none"; }
modal.onmousedown = e => { if (e.target === modal) closeModal(); };
modal.addEventListener("touchstart", e => { if (e.target === modal) closeModal(); });

// --- Admin Panel toggle ---
const toggleBtn = document.getElementById('togglePanel');
const adminPanel = document.getElementById('adminPanel');

toggleBtn.onclick = function () {
    const willCollapse = !adminPanel.classList.contains('collapsed');
    if (willCollapse) {
        adminPanel.classList.add('collapsed');
        adminPanel.classList.remove('open');
        toggleBtn.textContent = "Verktyg";
    } else {
        adminPanel.classList.remove('collapsed');
        adminPanel.classList.add('open');
        toggleBtn.textContent = "Stäng";
    }
    if (!isMobile()) {
        viewport.classList.toggle('expanded', willCollapse);
    }
};

// --- Responsive layout adjustments ---
function handleResize() {
    // Reconnect lines on layout change
    requestAnimationFrame(() => {
        connect();
    });
    
    // Auto-fit on first mobile load
    if (isMobile() && !window._hasFit) {
        window._hasFit = true;
        setTimeout(fitToView, 100);
    }
}

// Observe resize
window.addEventListener('resize', handleResize);

// Initial mobile fit
if (isMobile()) {
    adminPanel.classList.add('collapsed');
    viewport.classList.add('expanded');
    setTimeout(fitToView, 200);
}

// Swipe down to close panel on mobile
let panelTouchStartY = 0;
adminPanel.addEventListener('touchstart', e => {
    panelTouchStartY = e.touches[0].clientY;
}, { passive: true });
adminPanel.addEventListener('touchmove', e => {
    const dy = e.touches[0].clientY - panelTouchStartY;
    if (dy > 80) {
        adminPanel.classList.add('collapsed');
        adminPanel.classList.remove('open');
        toggleBtn.textContent = "Verktyg";
    }
}, { passive: true });
</script>
</body>
</html>
